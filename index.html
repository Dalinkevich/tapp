<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Мой Mini App</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка с информацией о пользователе -->
        <header class="header">
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="user-details">
                    <h1 id="user-name">Загрузка...</h1>
                    <p id="user-id">ID: --</p>
                </div>
            </div>
            <button class="theme-toggle" id="theme-toggle">🌓</button>
        </header>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- Приветственная секция -->
            <section class="welcome-card">
                <h2>Добро пожаловать! 👋</h2>
                <p>Это демо Mini App с полной интеграцией Telegram.</p>
            </section>

            <!-- Интерактивные кнопки -->
            <section class="actions-grid">
                <button class="action-btn" id="btn-haptic">
                    <span class="icon">📳</span>
                    <span class="label">Вибрация</span>
                </button>
                <button class="action-btn" id="btn-popup">
                    <span class="icon">💬</span>
                    <span class="label">Показать Popup</span>
                </button>
                <button class="action-btn" id="btn-data">
                    <span class="icon">📊</span>
                    <span class="label">Мои данные</span>
                </button>
                <button class="action-btn" id="btn-share">
                    <span class="icon">🔗</span>
                    <span class="label">Поделиться</span>
                </button>
            </section>

            <!-- Счетчик с анимацией -->
            <section class="counter-section">
                <h3>Интерактивный счетчик</h3>
                <div class="counter-display" id="counter">0</div>
                <div class="counter-controls">
                    <button class="counter-btn minus" id="btn-minus">−</button>
                    <button class="counter-btn plus" id="btn-plus">+</button>
                </div>
            </section>

            <!-- Статус темы -->
            <section class="theme-info">
                <h3>Текущая тема</h3>
                <div class="theme-colors" id="theme-colors">
                    <!-- Цвета будут отображаться здесь -->
                </div>
            </section>
        </main>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home">
                <span>🏠</span>
                <span>Главная</span>
            </button>
            <button class="nav-btn" data-page="profile">
                <span>👤</span>
                <span>Профиль</span>
            </button>
            <button class="nav-btn" data-page="settings">
                <span>⚙️</span>
                <span>Настройки</span>
            </button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
